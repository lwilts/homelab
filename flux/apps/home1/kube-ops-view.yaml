apiVersion: v1
kind: Namespace
metadata:
  name: kube-ops-view
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: christianhuth
  namespace: kube-ops-view
spec:
  interval: 24h
  url: https://charts.christianhuth.de/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-ops-view
  namespace: kube-ops-view
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-ops-view
      version: "8.0.6"
      sourceRef:
        kind: HelmRepository
        name: christianhuth
        namespace: kube-ops-view
  values:
    serviceAccount:
      create: true
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    redis:
      architecture: standalone
      auth:
        enabled: false
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-ops-view
  namespace: kube-ops-view
spec:
  parentRefs:
  - name: lab-gateway
    namespace: nginx-gateway
    sectionName: https
  hostnames:
  - "ops.lab.lkwt.dev"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kube-ops-view
      port: 80
