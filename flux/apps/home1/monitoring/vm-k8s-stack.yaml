apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  interval: 30m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.72.6"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: monitoring
  values:
    crds:
      enabled: true

    # VMSingle — single-node time-series storage
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "30d"
        storage:
          storageClassName: local-path
          resources:
            requests:
              storage: 20Gi
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

    # VMAgent — scrapes all targets, writes to vmsingle
    vmagent:
      enabled: true

    # VMAlert + Alertmanager — default alert rules, no notifier yet
    vmalert:
      enabled: true
    alertmanager:
      enabled: true

    # Curated dashboards and alert rules
    defaultDashboardsEnabled: true
    defaultRules:
      create: true

    # Disable control-plane scrapes that don't exist on k3s
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    # Grafana subchart
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        size: 5Gi
        storageClassName: local-path
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          searchNamespace: ALL
      service:
        type: ClusterIP
        port: 80
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    # Bundled node-exporter (replaces standalone HelmRelease)
    prometheus-node-exporter:
      enabled: true

    # Bundled kube-state-metrics (replaces standalone HelmRelease)
    kube-state-metrics:
      enabled: true
---
# Grafana UI
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: lab-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "grafana.lab.lkwt.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: victoria-metrics-k8s-stack-grafana
          port: 80
---
# VictoriaMetrics native UI (vmui)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmui
  namespace: monitoring
spec:
  parentRefs:
    - name: lab-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "vmui.lab.lkwt.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vmsingle-victoria-metrics-k8s-stack
          port: 8428
