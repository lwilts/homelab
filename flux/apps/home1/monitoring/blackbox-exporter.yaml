apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  interval: 30m
  dependsOn:
    - name: victoria-metrics-k8s-stack
      namespace: monitoring
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: "8.17.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    fullnameOverride: blackbox-exporter
    config:
      modules:
        http_2xx:
          prober: http
          http:
            preferred_ip_protocol: ip4
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
            valid_status_codes: [200]
            method: GET
        icmp:
          prober: icmp
          icmp:
            preferred_ip_protocol: ip4
    service:
      type: ClusterIP
      port: 9115
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
---
# Probe external services through the full TLS + Gateway path.
# SSL cert expiry comes free via probe_ssl_earliest_cert_expiry.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: external-http
  namespace: monitoring
spec:
  jobName: blackbox-external-http
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  module: http_2xx
  targets:
    staticConfig:
      targets:
        - https://jellyfin.lab.lkwt.dev
        - https://grafana.lab.lkwt.dev
        - https://k8s.lab.lkwt.dev
        - https://ops.lab.lkwt.dev
        - https://speedtest.lab.lkwt.dev
        - https://search.lab.lkwt.dev
---
# Home Assistant probed via internal cluster URL to avoid MetalLB L2 hairpin.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: home-assistant
  namespace: monitoring
spec:
  jobName: blackbox-home-assistant
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  module: http_2xx
  targets:
    staticConfig:
      targets:
        - http://home-assistant.home-assistant.svc.cluster.local:8123/
---
# ICMP connectivity probes
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: icmp-connectivity
  namespace: monitoring
spec:
  jobName: blackbox-icmp
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  module: icmp
  targets:
    staticConfig:
      targets:
        - 8.8.8.8
        - 1.1.1.1
        - 192.168.68.1
