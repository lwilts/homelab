# Scrape cert-manager metrics for certificate expiry tracking.
# Gives certmanager_certificate_expiration_timestamp_seconds in Grafana.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: cert-manager
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  endpoints:
    - port: http-metrics
      path: /metrics
