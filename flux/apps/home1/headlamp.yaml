apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    replicaCount: 1
    config:
      inCluster: true
    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    persistentVolumeClaim:
      enabled: false
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
---
# Login token for the Headlamp UI.
# Generate a 1-year token for the headlamp ServiceAccount and paste it into
# Headlamp's login screen:
#
#   kubectl -n headlamp create token headlamp --duration=8760h
#
# Note: we intentionally do NOT declare a `kubernetes.io/service-account-token`
# Secret here. On k8s 1.30+ the LegacyServiceAccountTokenCleaner controller
# garbage-collects manually-created SA token Secrets, so the modern
# `kubectl create token` TokenRequest API is the right flow.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  parentRefs:
  - name: lab-gateway
    namespace: nginx-gateway
    sectionName: https
  hostnames:
  - "k8s.lab.lkwt.dev"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: headlamp
      port: 80
