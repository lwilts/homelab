apiVersion: v1
kind: Namespace
metadata:
  name: music-assistant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-assistant-data-pvc
  namespace: music-assistant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-assistant
  namespace: music-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music-assistant
  template:
    metadata:
      labels:
        app: music-assistant
    spec:
      containers:
      - name: music-assistant
        image: ghcr.io/music-assistant/server:latest
        ports:
        - containerPort: 8095
          name: http
        - containerPort: 8097
          name: stream
        env:
        - name: TZ
          value: "Europe/London"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8095
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8095
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: music-assistant-data-pvc
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
---
apiVersion: v1
kind: Service
metadata:
  name: music-assistant
  namespace: music-assistant
spec:
  selector:
    app: music-assistant
  ports:
    - name: http
      protocol: TCP
      port: 8095
      targetPort: 8095
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: music-assistant
  namespace: music-assistant
spec:
  parentRefs:
  - name: lab-gateway
    namespace: nginx-gateway
    sectionName: https
  hostnames:
  - "music.lab.lkwt.dev"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: music-assistant
      port: 8095
